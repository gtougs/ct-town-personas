# CT Town Personas — Dataset Registry
# All filters verified against real CTData CSV schemas via check_schemas.py
# ──────────────────────────────────────────────────────────────────────────────

datasets:

  # ── DEMOGRAPHICS ─────────────────────────────────────────────────────────────

  - name: median_age_by_town
    resource_id: 9c57dea5-ec15-4efa-afb9-3987309c1680
    source: ctdata_ckan
    domain: demographics
    frequency: annual
    description: "Median Age by Town — ACS 5-year"
    total_filters:
      Gender: "Total"
      Race/Ethnicity: "All"
    measure_filter: "Number"
    canonical_variable: "Median Age"

  - name: population_by_age_by_town
    resource_id: 12e2787a-cf25-487e-adab-b8d54cde0ca3
    source: ctdata_ckan
    domain: demographics
    frequency: annual
    description: "Population by Age by Town — ACS 5-year"
    # No 'Total' gender — Female+Male only. Handled in feature_builder by summing.
    total_filters: {}
    measure_filter: "Number"
    canonical_variable: "Population"

  - name: population_by_race_by_town
    resource_id: 330be010-cce6-4580-a000-e870b30193fa
    source: ctdata_ckan
    domain: demographics
    frequency: annual
    description: "Population by Race/Ethnicity by Town — ACS 5-year"
