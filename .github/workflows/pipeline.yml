name: Refresh Data Pipeline

on:
  schedule:
    # Runs 1st of every month at 06:00 UTC
    # ACS updates annually, SOTS business data updates monthly
    - cron: "0 6 1 * *"
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion + pipeline
        env:
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: python -m pipeline.run_all

      - name: Upload processed data as artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-data-${{ github.run_id }}
          path: data/processed/
          retention-days: 90
